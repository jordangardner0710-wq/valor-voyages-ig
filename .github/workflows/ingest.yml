name: Ingest (Dropbox -> Sheet)

on:
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      DROPBOX_FOLDER: ${{ secrets.DROPBOX_FOLDER }}
      SHEET_ID: ${{ secrets.SHEET_ID }}
      SHEET_TAB: ${{ secrets.SHEET_TAB }}
      GOOGLE_SA_JSON_PATH: ./google-sa.json
    steps:
      - uses: actions/checkout@v4
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore service account JSON
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python -c "import os; open('google-sa.json','w').write(os.environ['GOOGLE_SA_JSON'])"
      - run: python src/ingest.py
